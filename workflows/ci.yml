name: MusicWe CI

on:
  push:
    branches: [ main, deploy ]
  pull_request:
    branches: [ main, deploy ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run basic test
        run: npm test
